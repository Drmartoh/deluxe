{% extends "base.html" %}
{% block title %}Order Success | Deluxe{% endblock %}
{% block content %}
<section class="max-w-2xl mx-auto px-4 sm:px-6 py-12 sm:py-16 text-center">
  <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 sm:p-8">
    <h1 class="text-2xl sm:text-4xl font-bold mb-3">Order Confirmed 🎉</h1>
    <p class="text-zinc-300 mb-2">Thank you for your order, {{ order.customer.name }}.</p>
    <p class="text-zinc-300">Tracking Code: <span class="font-bold text-amber-400">{{ order.tracking_code }}</span></p>
    <a href="{% url 'order-tracking' %}?tracking_code={{ order.tracking_code }}" class="inline-block mt-6 bg-red-600 px-5 py-2 rounded-lg">Track Order</a>
  </div>
</section>
{% endblock %}
